<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="respons.css">
    <link rel="stylesheet" href="font.css">
    <script src="https://kit.fontawesome.com/442670bb5a.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="navContainer">
            <div class="mobileToggle" id="mobileToggle">
                <i class="fas fa-bars"></i>
            </div>

            <div class="logo">
                <h2>LOGO</h2>
            </div>

            <div class="navLinks">
                <a href="../index.html">الرئيسية</a>
                <a href="#">الأسئلة الشائعة</a>
                <a href="#">احجز موعد</a>
                <a href="#">نصائح طبية</a>
                <a href="#">الأطباء</a>
            </div>

            <div class="buttons">
                <i class="fa-regular fa-user"></i>
            </div>
        </div>
    </header>

    <main class="authPage">
        <section class="loginForm">
            <h2>تسجيل الدخول</h2>

            <form action="login.html" method="post">
                <div class="field">
                    <label for="phoneNumber">رقم الهاتف</label>
                    <input type="text" id="phoneNumber" placeholder="رقم الهاتف" required>
                </div>

                <div class="field passwordContainer">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" placeholder="كلمة المرور" required>
                    <!-- closed eye -->
                    <i class="fa-solid fa-eye-slash togglePassword" id="togglePassword"></i>
                </div>

                <button class="btn" type="submit">تسجيل الدخول</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="footerContainer">
            <div class="footerLogo">
                <h2>LOGO</h2>
            </div>

            <div class="footerLinks">
                <a href="../index.html">الرئيسية</a>
                <a href="#">الأسئلة الشائعة</a>
                <a href="#">احجز موعد</a>
                <a href="#">النصائح الطبية</a>
                <a href="#">الأطباء</a>
                <a href="about.html">من نحن</a>
                <a href="privacy.html">سياسة الخصوصية</a>
                <a href="terms.html">شروط التطوع</a>
                <a href="contact.html">قسم الشكاوي</a>
            </div>

            <div class="line"></div>

            <div class="footerBottom">
                <p>جميع الحقوق محفوظة © 2026</p>
            </div>
        </div>
    </footer>
</body>

</html>
